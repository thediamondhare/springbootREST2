spring.application.name=springbootREST

#  with wildcard * all endpoints would be enabled
# certain endpoints with a comma de-limited string list

# management.endpoints.web.exposure.include=*
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true

info.app.name = springbootREST
info.app.description = Basic Java Spring Backend App with REST api  and My SQL DB made with Udemy course
info.app.version = 1.0.0

# login in credential if security dependency is enabled
# spring.security.user.name=exampleUser
# spring.security.user.password=security123pass

# to exclude some endpoints:
# management.endpoints.web.exposure.exclude=health,info

coach.name=tdh
team.name=TDHteam

# changing Spring Boot embedded server port
server.port=7070

# setting the context path of the application
# all requests should be prefixed with /javaSpringBE
server.servlet.context-path=/springbootRESTapi

springdoc.swagger-ui.path=/customuipath

# spring.main.lazy-initialization=true

spring.datasource.url=jdbc:mysql://localhost:3306/employee_directory
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# logging.level.web=DEBUG

spring.main.banner-mode=off

# reduce log info level
logging.level.root=warn

# add logging configs to display SQL statements
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=trace